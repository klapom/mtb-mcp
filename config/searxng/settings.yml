# SearXNG settings for mtb-mcp
# Used for GPS-Tour.info and other meta-searches

use_default_settings: true

search:
  safe_search: 0
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "mtb-mcp-searxng-local"
  limiter: false
  image_proxy: false
  method: "GET"

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: bing
    engine: bing
    shortcut: bi
